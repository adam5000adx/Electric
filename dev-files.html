<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير الملفات - المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .file-manager {
            background: rgba(15, 25, 45, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .file-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-item:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: translateX(5px);
        }
        .file-name {
            font-weight: bold;
            color: #00ffff;
            direction: ltr;
            text-align: left;
        }
        .file-size {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .file-actions {
            display: flex;
            gap: 10px;
        }
        .file-actions button {
            width: auto;
            padding: 5px 12px;
            margin: 0;
            font-size: 12px;
        }
        .code-viewer {
            background: #0a0f1e;
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 500px;
            overflow: auto;
        }
        .code-viewer pre {
            margin: 0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            direction: ltr;
            text-align: left;
            color: #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .path-bar {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .current-path {
            color: #00ffff;
            font-size: 14px;
            flex: 1;
            direction: ltr;
        }
        .btn-small {
            width: auto;
            padding: 5px 15px;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-top: 1px solid rgba(0,255,255,0.2);
        }
        .footer p { color: #888; font-size: 12px; }
        .footer span { color: #00ffff; font-weight: bold; }
        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
            align-items: center;
        }
        .breadcrumb-item {
            background: rgba(0, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .breadcrumb-item:hover {
            background: rgba(0, 255, 255, 0.3);
        }
        .status-bar {
            background: rgba(0, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #00ffff;
        }
        .delete-btn { background: #dc3545 !important; }
        .edit-btn { background: #ffc107 !important; color: #333 !important; }
        .save-btn { background: #28a745 !important; }
        .cancel-btn { background: #6c757d !important; }
        textarea {
            width: 100%;
            background: #0a0f1e;
            border: 1px solid #00ffff;
            color: #00ff00;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <span style="flex-grow: 1;">📁 مدير ملفات المطور</span>
            <a href="dev-panel.html">⚡ لوحة المطور</a>
            <a href="index.html" onclick="logoutDev()" class="logout-btn">🚪 خروج</a>
        </div>

        <div class="status-bar" id="statusBar">
            💡 يعمل في وضع القراءة فقط (للأمان). لتعديل الملفات، استخدم VS Code مباشرة.
        </div>

        <div class="path-bar">
            <span class="current-path" id="currentPath">📂 المسار الحالي: /</span>
            <button class="btn-small" onclick="refreshFiles()">🔄 تحديث</button>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>

        <div class="file-manager">
            <h3>📄 الملفات في هذا المجلد</h3>
            <div id="filesList">✨ جاري التحميل...</div>
        </div>

        <div class="file-manager" id="codeViewer" style="display:none;">
            <h3>📝 محتوى الملف: <span id="currentFileName" style="color:#00ffff;"></span></h3>
            <div class="code-viewer">
                <pre id="fileContent">...</pre>
            </div>
            <div style="margin-top: 15px;">
                <button onclick="closeViewer()" class="btn-small">❌ إغلاق</button>
                <button onclick="downloadCurrentFile()" class="btn-small">📥 تحميل الملف</button>
            </div>
        </div>

        <div class="footer">
            <p>Developed by <span>Adam Ahmed</span> © 2026</p>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('devLoggedIn')) {
            window.location.href = 'dev-login.html';
        }
        
        let currentDirectory = '/';
        let currentFilesList = [];
        let currentViewingFile = '';
        
        function logoutDev() {
            localStorage.removeItem('devLoggedIn');
            window.location.href = 'index.html';
        }
        
        // جلب قائمة الملفات من السيرفر
        async function getDirectoryContents(path) {
            try {
                const response = await fetch('/api/list?path=' + encodeURIComponent(path));
                if (response.ok) {
                    return await response.json();
                }
            } catch(e) {
                console.log('API not available, using static list');
            }
            // إذا كان الـ API مش متاح، نستخدم قائمة ثابتة
            return getStaticFileList();
        }
        
        function getStaticFileList() {
            return [
                { name: 'index.html', type: 'file', size: '5.2 KB' },
                { name: 'login.html', type: 'file', size: '4.1 KB' },
                { name: 'worker.html', type: 'file', size: '18.3 KB' },
                { name: 'contractor.html', type: 'file', size: '8.7 KB' },
                { name: 'contractor-login.html', type: 'file', size: '3.5 KB' },
                { name: 'manage-workers.html', type: 'file', size: '12.4 KB' },
                { name: 'manage-sites.html', type: 'file', size: '11.2 KB' },
                { name: 'add-attendance.html', type: 'file', size: '14.8 KB' },
                { name: 'add-food.html', type: 'file', size: '10.5 KB' },
                { name: 'add-loan.html', type: 'file', size: '9.3 KB' },
                { name: 'reports.html', type: 'file', size: '15.6 KB' },
                { name: 'worker-details.html', type: 'file', size: '17.2 KB' },
                { name: 'edit-worker.html', type: 'file', size: '6.8 KB' },
                { name: 'dev-panel.html', type: 'file', size: '7.4 KB' },
                { name: 'dev-login.html', type: 'file', size: '3.2 KB' },
                { name: 'dev-files.html', type: 'file', size: '12.1 KB' },
                { name: 'style.css', type: 'file', size: '8.9 KB' },
                { name: 'firebase-config.js', type: 'file', size: '1.2 KB' }
            ];
        }
        
        function updateBreadcrumb() {
            const parts = currentDirectory === '/' ? [] : currentDirectory.split('/').filter(p => p);
            let html = `<div class="breadcrumb-item" onclick="navigateTo('/')">🏠 الرئيسية</div>`;
            let path = '';
            for (let i = 0; i < parts.length; i++) {
                path += '/' + parts[i];
                html += `<span> / </span><div class="breadcrumb-item" onclick="navigateTo('${path}/')">${parts[i]}</div>`;
            }
            document.getElementById('breadcrumb').innerHTML = html;
            document.getElementById('currentPath').innerHTML = `📂 المسار الحالي: ${currentDirectory}`;
        }
        
        function navigateTo(path) {
            currentDirectory = path;
            document.getElementById('codeViewer').style.display = 'none';
            loadFiles();
        }
        
        async function loadFiles() {
            const files = await getDirectoryContents(currentDirectory);
            currentFilesList = files;
            
            if (files.length === 0) {
                document.getElementById('filesList').innerHTML = '<div class="empty-message">📭 هذا المجلد فارغ</div>';
                return;
            }
            
            let html = '';
            files.forEach(file => {
                const icon = file.type === 'directory' ? '📁' : '📄';
                const color = file.type === 'directory' ? '#ffa500' : '#00ffff';
                html += `
                    <div class="file-item">
                        <div onclick="${file.type === 'directory' ? `navigateTo('${currentDirectory}${file.name}/')` : `viewFile('${file.name}')`}" style="flex:1; cursor:pointer;">
                            <div class="file-name" style="color:${color}">${icon} ${file.name}</div>
                            <div class="file-size">${file.size || ''}</div>
                        </div>
                        <div class="file-actions">
                            <button onclick="downloadFile('${file.name}')">📥 تحميل</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('filesList').innerHTML = html;
            updateBreadcrumb();
        }
        
        async function viewFile(filename) {
            currentViewingFile = filename;
            try {
                const response = await fetch(filename);
                const content = await response.text();
                document.getElementById('currentFileName').innerText = filename;
                document.getElementById('fileContent').innerText = content;
                document.getElementById('codeViewer').style.display = 'block';
            } catch(e) {
                document.getElementById('fileContent').innerText = '❌ خطأ في قراءة الملف: ' + e.message;
                document.getElementById('codeViewer').style.display = 'block';
            }
        }
        
        function closeViewer() {
            document.getElementById('codeViewer').style.display = 'none';
        }
        
        function downloadFile(filename) {
            const link = document.createElement('a');
            link.href = filename;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function downloadCurrentFile() {
            if (currentViewingFile) {
                downloadFile(currentViewingFile);
            }
        }
        
        function refreshFiles() {
            loadFiles();
            document.getElementById('codeViewer').style.display = 'none';
        }
        
        loadFiles();
    </script>
</body>
</html>
